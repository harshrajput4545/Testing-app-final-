<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NTA-Style Test Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <!-- Setup Screen -->
  <div id="setup-screen" class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="header text-center mb-5">
          <h1>NTA-Style Test Platform</h1>
          <p class="lead">Create and take tests in NTA format</p>
        </div>
        <div class="card question-card">
          <div class="card-body p-5">
            <h3 class="card-title text-center mb-4">Test Setup</h3>
            <div class="mb-4">
              <label for="test-title" class="form-label">Test Title</label>
              <input type="text" class="form-control" id="test-title" placeholder="Enter test title" value="Percentage Practice Test" />
            </div>
            <div class="mb-4">
              <label for="sections-count" class="form-label">Number of Sections</label>
              <input type="number" class="form-control" id="sections-count" min="1" max="5" value="1" />
            </div>
            <div id="sections-container"></div>
            <div class="text-center mt-4">
              <button id="parse-questions" class="btn btn-info me-2">Parse Questions</button>
              <button id="start-test-btn" class="btn btn-primary btn-lg">Start Test</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Test Screen -->
  <div id="test-screen" class="full-screen-container d-none">
    <div class="header">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <h2 id="test-title-display">Test Title</h2>
          <div class="d-flex align-items-center">
            <div class="timer me-3" id="test-timer">00:00:00</div>
            <button class="btn btn-light me-2" id="toggle-mode">Dark Mode</button>
            <button class="btn btn-danger" id="end-test-btn">End Test</button>
          </div>
        </div>
        <div class="d-flex mt-3" id="section-tabs"></div>
      </div>
    </div>
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="current-section-name">Section 1</h3>
        <div class="progress" style="width: 300px; height: 20px;">
          <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
      </div>
      <div id="questions-container"></div>
    </div>
    <div class="navigation-btns">
      <div class="container">
        <div class="d-flex justify-content-between">
          <button id="prev-btn" class="btn btn-secondary">Previous</button>
          <button id="next-btn" class="btn btn-primary">Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Results Screen -->
  <div id="results-screen" class="full-screen-container d-none">
    <div class="container py-5">
      <div class="header text-center mb-5">
        <h1>Test Results</h1>
        <p class="lead">Summary of your performance</p>
      </div>
      <div class="row mb-5">
        <div class="col-md-4 mb-4">
          <div class="card result-card">
            <div class="card-body text-center">
              <h5 class="card-title">Correct Answers</h5>
              <h2 id="correct-answers" class="text-success">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-4">
          <div class="card incorrect-card">
            <div class="card-body text-center">
              <h5 class="card-title">Incorrect Answers</h5>
              <h2 id="incorrect-answers" class="text-danger">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-4">
          <div class="card skipped-card">
            <div class="card-body text-center">
              <h5 class="card-title">Skipped Questions</h5>
              <h2 id="skipped-questions" class="text-warning">0</h2>
            </div>
          </div>
        </div>
      </div>
      <div class="card mb-5">
        <div class="card-header"><h3>Detailed Results</h3></div>
        <div class="card-body"><div id="results-details"></div></div>
      </div>
      <div class="text-center">
        <button id="download-pdf" class="btn btn-primary btn-lg me-3">Download PDF Report</button>
        <button id="back-to-setup" class="btn btn-secondary btn-lg">Back to Setup</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
